<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Tabla Plan de Trabajo</title>
    <style>
    /* Regla para configurar la hoja */
    @page {
        size: letter portrait; 
        margin: 15mm;
    }
    
    /* --- ESTILOS COMPATIBLES CON PDF (CSS 2.1) --- */
    body {
        font-family: Helvetica, Arial, sans-serif; 
        background-color: #ffffff;
        padding: 0; 
        margin: 0;
    }
    
    /* TABLA LAYOUT DEL ENCABEZADO */
    .header-layout {
        width: 100%;
        border: none;
        margin-bottom: 20px;
        table-layout: fixed;
    }
    .header-layout td {
        vertical-align: middle;
        padding: 5px;
    }
    .header-logo-left { text-align: left; width: 20%; }
    .header-center { text-align: center; width: 60%; }
    .header-logo-right { text-align: right; width: 20%; }

    .titulo-principal {
        color: #4B5320; /* CAMBIO: Verde Oliva */
        font-size: 22px; 
        margin: 0;
        font-weight: bold;
        text-transform: uppercase;
    }
    .subtitulo-principal {
        color: #2C2C2C; /* CAMBIO: Gris oscuro para contraste elegante */
        font-size: 16px; 
        margin: 5px 0 0 0;
    }

    .titulo-mes {
        color: #4B5320; /* CAMBIO: Verde Oliva (Antes Rojo) */
        font-size: 24px;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 10px;
        border-bottom: 2px solid #D4AF37; /* CAMBIO: Dorado Metálico */
        padding-bottom: 5px;
        display: block;
    }

    .tabla-conqui {
        width: 100%;
        border-collapse: collapse;
        background-color: #ffffff;
        -fs-table-paginate: paginate;
        table-layout: fixed;
        padding-right: 5px;
        padding-left: 5px; 
    }

    /* ENCABEZADOS */
    .tabla-conqui thead tr {
        background-color: #4B5320; /* CAMBIO: Verde Oliva principal */
        color: #FFFFFF;
    }

    .tabla-conqui thead th {
        padding: 8px;
        font-size: 11px;
        border-bottom: 4px solid #D4AF37; /* CAMBIO: Dorado Metálico */
        vertical-align: middle;
        text-align: left;
    }

    .header-pregunta {
        display: block;
        font-size: 9px;
        opacity: 0.8;
        font-weight: normal;
        margin-bottom: 2px;
    }
    
    .header-titulo {
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
    }

    /* CUERPO */
    .tabla-conqui tbody tr {
        /* CAMBIO: Borde más sutil o dorado. Si quieres mantener la separación gruesa: */
        border-bottom: 1px solid #D4AF37; 
    }

    /* Efecto Zebra (Filas alternas) */
    .tabla-conqui tbody tr:nth-child(even) {
        background-color: #F2F2EB; /* CAMBIO: Kaki muy pálido */
    }

    .tabla-conqui td {
        padding: 8px;
        color: #2C2C2C; /* CAMBIO: Negro suave */
        font-size: 11px;
        line-height: 1.3;
        vertical-align: middle;
    }

    /* Columnas específicas */
    .col-dia { 
        font-weight: bold; 
        text-align: center; 
        color: #4B5320; /* CAMBIO: Verde Oliva */
    }
    
    .col-costo { 
        font-family: monospace; 
        font-weight: bold; 
        text-align: right; 
        color: #8B0000; /* CAMBIO: Rojo Vino para el dinero */
        white-space: nowrap; 
    }
    
    .actividad-texto { 
        font-weight: bold; 
    }
</style>

                    </th>
                    <th style="text-align: center; width: 8%">
                        <span class="header-titulo">DÍA</span>
                    </th>

                    </th>

                    </th>

            </tbody>
        </table>
